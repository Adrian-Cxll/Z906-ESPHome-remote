esphome:
  name: z906
  friendly_name: Z906

esp8266:
  board: d1_mini

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret ha_password
  reboot_timeout: 10min

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  reboot_timeout: 10min

# Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Z906 Fallback Hotspot"
    password: "SeCuRe"

captive_portal:

# So that the onboard LED stays off.
output:
  - platform: gpio
    pin:
      number: D4
      inverted: true
    id: led_blue
light:
  - platform: binary
    output: led_blue
    id: led_blue_light
    restore_mode: ALWAYS_OFF



remote_transmitter:
  pin: 4
  carrier_duty_percent: 50%


button:

  - platform: template
    name: Z906 Power
    on_press: 
      then:
        - remote_transmitter.transmit_nec: 
            address: 0xA002
            command: 0x7F80
  

  - platform: template
    name: Z906 Input
    on_press: 
      then:
        - remote_transmitter.transmit_nec: 
            address: 0xA002
            command: 0xF708
  

